<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Interview Monitoring System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI Interview Monitoring System</h1>

        <div class="dashboard">

            <div class="camera-box">
                <video id="webcam" autoplay playsinline></video>
            </div>

            <div class="status-box">
                <h3>Monitoring Status</h3>

                <p id="cameraStatus">📷 Camera: OFF</p>
                <p id="violationCount">⚠️ Violations: 0</p>
                <p id="faceCount">🙂 Faces detected: 0</p>
                <p id="eyeStatus">👀 Eye Focus: Normal</p>
                <p id="lipStatus">🗣️ Lip Activity: Normal</p>

                <!-- ⭐ system warning badge -->
                <div id="systemMessage"
                     style="display:none;
                     margin:8px 0;
                     padding:8px;
                     border-radius:6px;
                     font-weight:bold;
                     text-align:center;">
                </div>

                <!-- ⭐ scrolling violation log panel -->
                <div id="logBox"
                     style="height:120px;
                     overflow-y:auto;
                     background:white;
                     padding:8px;
                     border-radius:6px;
                     font-size:13px;
                     box-shadow: inset 0 0 5px rgba(0,0,0,0.15);">
                     System Ready...
                </div>

                <button id="startBtn">Start Interview</button>

            </div>

        </div>
    </div>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

    <!-- Modules -->
    <script src="modules/violationEngine.js"></script>
    <script src="modules/tabMonitor.js"></script>
    <script src="modules/clipboardBlocker.js"></script>
    <script src="modules/faceDetection.js"></script>
    <script src="modules/lipMovement.js"></script>
    <script src="modules/eyeTracking.js"></script>
    <script src="modules/webcam.js"></script>

</body>
</html>
